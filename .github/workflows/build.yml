name: Build Hunted Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.10
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.10/bin" >> $GITHUB_PATH

      - name: Build
        run: gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: hunted-mod-jar
          path: build/libs/*.jar
          retention-days: 30
